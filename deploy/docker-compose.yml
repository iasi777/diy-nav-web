services:
  api:
    image: diy-nav-api:${TAG:-latest}
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: diy-nav-api
    restart: unless-stopped
    expose:
      - '8787'
    env_file:
      - path: ../.env
        required: false
    environment:
      NODE_ENV: production
      PORT: 8787
      DATABASE_PATH: /data/diy-nav.sqlite
      BACKUP_DIR: /backups
    volumes:
      - nav-data:/data
      - nav-backups:/backups
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:8787/readyz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  web:
    image: diy-nav-web:${TAG:-latest}
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: diy-nav-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '${TAILSCALE_IP:-100.87.23.114}:${WEB_PORT:-8090}:80'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--spider', 'http://127.0.0.1/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

volumes:
  nav-data:
    name: diy-nav-data
  nav-backups:
    name: diy-nav-backups
